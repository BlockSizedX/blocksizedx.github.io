<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — BlockSizedX</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="shortcut icon" href="../assets/work-images/logo-with-bg.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Inherit root design tokens ── */
    :root {
      --bg: #f7f5f2;
      --bg-alt: #efecea;
      --surface: #ffffff;
      --surface-2: #f0ede9;
      --border: #e2ddd8;
      --text: #1a1815;
      --text-2: #5a5650;
      --text-3: #9a958f;
      --accent: #1a1815;
      --accent-2: #ca9954;
      --accent-light: #f5ece7;
      --green: #2d6a4f;
      --red: #c0392b;
      --red-light: #fdf0ef;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-lg: 22px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --shadow-md: 0 6px 32px rgba(0,0,0,0.10);
      --shadow-lg: 0 16px 64px rgba(0,0,0,0.12);
      --font-display: 'Poppins', sans-serif;
      --font-body: 'Poppins', sans-serif;
      --nav-h: 64px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: var(--font-body); }

    /* ── Navbar ── */
    .acct-nav {
      height: var(--nav-h);
      background: rgba(247,245,242,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }
    .acct-nav-logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .acct-nav-logo span { color: var(--accent-2); }
    .acct-nav-back {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      padding: 8px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: var(--transition);
    }
    .acct-nav-back:hover { border-color: var(--text); color: var(--text); }

    /* ── Page layout ── */
    .acct-page {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px 80px;
    }
    .acct-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
    }

    /* ── Loading state ── */
    .acct-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 0;
      color: var(--text-3);
      font-size: 14px;
    }
    .acct-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Avatar ── */
    .acct-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .acct-avatar {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 14px;
      box-shadow: var(--shadow-md);
      letter-spacing: -0.02em;
    }
    .acct-username {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .acct-email {
      font-size: 13.5px;
      color: var(--text-3);
    }

    /* ── Info rows ── */
    .acct-divider { height: 1px; background: var(--border); margin: 24px 0; }
    .acct-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 13.5px;
    }
    .acct-info-label {
      color: var(--text-3);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .acct-info-label svg { width: 14px; height: 14px; }
    .acct-info-value { color: var(--text); font-weight: 500; }

    /* ── Buttons ── */
    .acct-btn {
      width: 100%;
      padding: 13px 20px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      margin-bottom: 10px;
    }
    .acct-btn-logout {
      background: var(--text);
      color: #fff;
    }
    .acct-btn-logout:hover { background: var(--accent-2); transform: translateY(-1px); }

    .acct-btn-advanced-toggle {
      background: transparent;
      color: var(--text-2);
      border: 1.5px solid var(--border);
      font-size: 13px;
    }
    .acct-btn-advanced-toggle:hover { border-color: var(--text); color: var(--text); }
    .acct-btn-advanced-toggle .toggle-icon {
      margin-left: auto;
      transition: transform 0.3s ease;
      font-size: 11px;
    }
    .acct-btn-advanced-toggle.open .toggle-icon { transform: rotate(180deg); }

    /* ── Advanced section ── */
    .acct-advanced {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s ease;
      opacity: 0;
    }
    .acct-advanced.open {
      max-height: 400px;
      opacity: 1;
    }
    .acct-advanced-inner {
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .acct-advanced-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 4px;
      padding: 0 4px;
    }
    .acct-btn-danger {
      background: var(--red-light);
      color: var(--red);
      border: 1.5px solid rgba(192,57,43,0.2);
    }
    .acct-btn-danger:hover { background: var(--red); color: #fff; transform: translateY(-1px); }
    .acct-btn-secondary {
      background: var(--surface-2);
      color: var(--text-2);
      border: 1.5px solid var(--border);
    }
    .acct-btn-secondary:hover { border-color: var(--text-2); color: var(--text); transform: translateY(-1px); }

    /* ── Toast ── */
    .acct-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 13.5px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
      white-space: nowrap;
      pointer-events: none;
    }
    .acct-toast.show { transform: translateX(-50%) translateY(0); }
    .acct-toast.error { background: var(--red); }

    /* ── Confirm dialog ── */
    .acct-confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .acct-confirm-overlay.open { opacity: 1; pointer-events: all; }
    .acct-confirm-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      transform: translateY(16px) scale(0.98);
      transition: transform 0.25s ease;
      text-align: center;
    }
    .acct-confirm-overlay.open .acct-confirm-box { transform: none; }
    .acct-confirm-icon {
      font-size: 36px;
      margin-bottom: 14px;
    }
    .acct-confirm-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--red);
    }
    .acct-confirm-text {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .acct-confirm-actions { display: flex; gap: 10px; }
    .acct-confirm-cancel {
      flex: 1;
      padding: 12px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-2);
      transition: var(--transition);
    }
    .acct-confirm-cancel:hover { border-color: var(--text); color: var(--text); }
    .acct-confirm-proceed {
      flex: 1;
      padding: 12px;
      border-radius: 100px;
      background: var(--red);
      color: #fff;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      transition: var(--transition);
    }
    .acct-confirm-proceed:hover { background: #a93226; }
    .acct-confirm-proceed:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .acct-card { padding: 32px 22px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="acct-nav">
  <a href="/" class="acct-nav-logo">Block<span>Sized</span>X</a>
  <a href="/" class="acct-nav-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </a>
</nav>

<!-- Account Page -->
<main class="acct-page">
  <div class="acct-card" id="acct-card">
    <!-- Loading state shown until Firebase resolves -->
    <div class="acct-loading" id="acct-loading">
      <div class="acct-spinner"></div>
      Loading your account…
    </div>

    <!-- Main content (hidden until loaded) -->
    <div id="acct-content" style="display:none;">
      <!-- Avatar + name -->
      <div class="acct-avatar-wrap">
        <div class="acct-avatar" id="acct-avatar">??</div>
        <div class="acct-username" id="acct-username">—</div>
        <div class="acct-email" id="acct-email">—</div>
      </div>

      <!-- Info rows -->
      <div class="acct-divider"></div>
      <div class="acct-info-row">
        <span class="acct-info-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Member since
        </span>
        <span class="acct-info-value" id="acct-joined">—</span>
      </div>
      <div class="acct-divider"></div>

      <!-- Logout -->
      <button class="acct-btn acct-btn-logout" id="acct-logout-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>

      <!-- Advanced Options toggle -->
      <button class="acct-btn acct-btn-advanced-toggle" id="acct-advanced-toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Advanced Options
        <span class="toggle-icon">▼</span>
      </button>

      <!-- Advanced section (collapsible) -->
      <div class="acct-advanced" id="acct-advanced">
        <div class="acct-advanced-inner">
          <div class="acct-advanced-label">Data & Privacy</div>
          <button class="acct-btn acct-btn-secondary" id="acct-request-data-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Request My Data
          </button>
          <button class="acct-btn acct-btn-secondary" id="acct-backend-delete-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Request Backend Deletion
          </button>
          <div class="acct-advanced-label" style="margin-top:8px;">Danger Zone</div>
          <button class="acct-btn acct-btn-danger" id="acct-delete-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Delete My Account
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Confirm dialog -->
<div class="acct-confirm-overlay" id="acct-confirm-overlay">
  <div class="acct-confirm-box">
    <div class="acct-confirm-icon">⚠️</div>
    <div class="acct-confirm-title" id="acct-confirm-title">Delete Account?</div>
    <div class="acct-confirm-text" id="acct-confirm-text">
      This action is <strong>permanent</strong>. Your account and all data will be deleted immediately.
    </div>
    <div class="acct-confirm-actions">
      <button class="acct-confirm-cancel" id="acct-confirm-cancel">Cancel</button>
      <button class="acct-confirm-proceed" id="acct-confirm-proceed">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="acct-toast" id="acct-toast"></div>

<!-- Firebase module -->
<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signOut, onAuthStateChanged, deleteUser
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, getDoc, setDoc, deleteDoc,
    doc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDlQD-hlNH9wuSDys7Tz4a1avzYs56WGLY",
    authDomain: "blocksizedx-sign-up.firebaseapp.com",
    projectId: "blocksizedx-sign-up",
    storageBucket: "blocksizedx-sign-up.firebasestorage.app",
    messagingSenderId: "39068339463",
    appId: "1:39068339463:web:d4424d30ee96d48252c9a2",
    measurementId: "G-00WSDSY7JS"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── Helpers ──────────────────────────────────
  const SESSION_KEY = 'bsx_session_user';
  const $ = id => document.getElementById(id);

  function getCachedUsername() {
    return localStorage.getItem(SESSION_KEY) || null;
  }
  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
  }
  function getInitials(str) {
    return (str || '??').slice(0, 2).toUpperCase();
  }

  // ── Toast ─────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, isError = false) {
    const toast = $('acct-toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.className = 'acct-toast' + (isError ? ' error' : '');
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }

  // ── Confirm dialog ────────────────────────────
  let confirmCallback = null;
  function showConfirm(title, text, proceedLabel, onProceed) {
    $('acct-confirm-title').textContent = title;
    $('acct-confirm-text').innerHTML = text;
    $('acct-confirm-proceed').textContent = proceedLabel;
    confirmCallback = onProceed;
    $('acct-confirm-overlay').classList.add('open');
  }
  function closeConfirm() {
    $('acct-confirm-overlay').classList.remove('open');
    confirmCallback = null;
  }
  $('acct-confirm-cancel').addEventListener('click', closeConfirm);
  $('acct-confirm-overlay').addEventListener('click', e => {
    if (e.target === $('acct-confirm-overlay')) closeConfirm();
  });
  $('acct-confirm-proceed').addEventListener('click', async () => {
    if (confirmCallback) {
      $('acct-confirm-proceed').disabled = true;
      $('acct-confirm-proceed').textContent = 'Processing…';
      await confirmCallback();
      $('acct-confirm-proceed').disabled = false;
    }
  });

  // ── Advanced toggle ───────────────────────────
  $('acct-advanced-toggle').addEventListener('click', () => {
    const adv = $('acct-advanced');
    const btn = $('acct-advanced-toggle');
    const isOpen = adv.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  });

  // ── Logout ────────────────────────────────────
  $('acct-logout-btn').addEventListener('click', async () => {
    try {
      await signOut(auth);
      clearSession();
      window.location.href = '/';
    } catch {
      showToast('Sign out failed. Please try again.', true);
    }
  });

  // ── Request Data ──────────────────────────────
  $('acct-request-data-btn').addEventListener('click', () => {
    const username = getCachedUsername() || 'Unknown';
    const email = $('acct-email').textContent || 'Unknown';
    const subject = encodeURIComponent('Request My Data - BlockSizedX');
    const body = encodeURIComponent(
`Hello BlockSizedX Team,

I would like to request a copy of all personal data you hold for my account.

Account Details:
- Username: ${username}
- Email: ${email}

Reason: I am exercising my right to data portability and would like to review all information associated with my account.

Please send the data to my registered email address.

Thank you.`
    );
    window.location.href = `mailto:blocksizedx@gmail.com?subject=${subject}&body=${body}`;
  });

  // ── Request Backend Deletion ──────────────────
  $('acct-backend-delete-btn').addEventListener('click', () => {
    const username = getCachedUsername() || 'Unknown';
    const email = $('acct-email').textContent || 'Unknown';
    const subject = encodeURIComponent('Request Backend Deletion - BlockSizedX');
    const body = encodeURIComponent(
`Hello BlockSizedX Team,

I would like to request the permanent deletion of all backend data associated with my account, including any server-side records, analytics, logs, or other stored information.

Account Details:
- Username: ${username}
- Email: ${email}

I understand this action may be irreversible. Please confirm once the deletion is complete.

Thank you.`
    );
    window.location.href = `mailto:blocksizedx@gmail.com?subject=${subject}&body=${body}`;
  });

  // ── Delete Account ────────────────────────────
  $('acct-delete-btn').addEventListener('click', () => {
    const username = getCachedUsername() || 'your account';
    showConfirm(
      'Delete Account?',
      `This will <strong>permanently delete</strong> the account "<strong>${username}</strong>" and all associated data.<br><br>This action cannot be undone.`,
      'Delete Forever',
      async () => {
        closeConfirm();
        // Second confirm
        showConfirm(
          'Are you absolutely sure?',
          `Type "DELETE" mentally and confirm. Your account data will be gone immediately. There is no recovery.`,
          'Yes, Delete Forever',
          performDeleteAccount
        );
      }
    );
  });

  async function performDeleteAccount() {
    closeConfirm();
    const fbUser = auth.currentUser;
    if (!fbUser) {
      showToast('No active session. Please sign in again.', true);
      return;
    }

    const uid = fbUser.uid;

    try {
      // 1. Fetch user document
      const userRef = doc(db, 'users', uid);
      const userSnap = await getDoc(userRef);
      const userData = userSnap.exists() ? userSnap.data() : {};

      // 2. Copy to deleted/ collection with deletedAt timestamp
      const deletedRef = doc(db, 'deleted', uid);
      await setDoc(deletedRef, {
        username:  userData.username  || null,
        email:     userData.email     || fbUser.email || null,
        createdAt: userData.createdAt || null,
        joined:    userData.joined    || null,
        deletedAt: Date.now()
      });

      // 3. Delete Firestore user document
      await deleteDoc(userRef);

      // 4. Delete Firebase Auth user
      await deleteUser(fbUser);

      // 5. Clear session and redirect
      clearSession();
      window.location.href = '/';

    } catch (err) {
      // Handle requires-recent-login error
      if (err.code === 'auth/requires-recent-login') {
        showToast('For security, please sign out and sign back in, then try again.', true);
      } else {
        showToast('Deletion failed. Please try again or contact support.', true);
      }
    }
  }

  // ── Auth state — main entry point ─────────────
  onAuthStateChanged(auth, async (fbUser) => {
    if (!fbUser) {
      // Not logged in — redirect with from=account tracking
      window.location.replace('/index.html?openLogin=true&from=account');
      return;
    }

    try {
      // Fetch Firestore data
      const snap = await getDoc(doc(db, 'users', fbUser.uid));
      const data = snap.exists() ? snap.data() : {};

      const username = data.username || getCachedUsername() || fbUser.email || 'User';
      const email    = data.email    || fbUser.email || '—';
      const joined   = data.joined   || '—';

      // Cache username in case it wasn't set
      localStorage.setItem(SESSION_KEY, username);

      // Render
      $('acct-avatar').textContent   = getInitials(username);
      $('acct-username').textContent = username;
      $('acct-email').textContent    = email;
      $('acct-joined').textContent   = joined;

    } catch {
      // Graceful fallback if Firestore fails
      const username = getCachedUsername() || fbUser.email || 'User';
      $('acct-avatar').textContent   = getInitials(username);
      $('acct-username').textContent = username;
      $('acct-email').textContent    = fbUser.email || '—';
      $('acct-joined').textContent   = '—';
    }

    // Show content, hide loader
    $('acct-loading').style.display = 'none';
    $('acct-content').style.display = 'block';
  });
</script>

</body>
</html>
