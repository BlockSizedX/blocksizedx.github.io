<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockSized Platformer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(to bottom, #1a1a1a, #2c2c2c);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #191919;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .btn {
      width: 60px;
      height: 60px;
      background: #444;
      color: white;
      font-size: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    #jumpBtn {
      position: absolute;
      bottom: 10px;
      right: 10px;
    }
    #scoreBoard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="scoreBoard">Score: 0</div>
  <canvas id="gameCanvas"></canvas>
  <div id="controls">
    <div class="btn" id="leftBtn">⬅</div>
    <div class="btn" id="rightBtn">➡</div>
  </div>
  <div class="btn" id="jumpBtn">⬆</div>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    const scoreBoard = document.getElementById("scoreBoard");

    let gravity = 0.8;
    let friction = 0.9;
    const keys = { left: false, right: false, up: false };

    const player = {
      x: 100,
      y: 100,
      width: 40,
      height: 40,
      color: "#00BFFF",
      vx: 0,
      vy: 0,
      jumping: false,
    };

    const platforms = [];
    const coins = [];

    function generatePlatforms() {
      platforms.length = 0;
      coins.length = 0;
      let y = canvas.height - 60;
      let x = 0;
      while (x < 10000) {
        const width = 100 + Math.random() * 100;
        const height = 20;
        platforms.push({ x, y, width, height });

        if (Math.random() < 0.4) {
          coins.push({ x: x + width / 2, y: y - 30, radius: 10 });
        }

        x += width + 100 + Math.random() * 200;
        y = canvas.height - 100 - Math.random() * 200;
      }
    }

    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function drawPlatforms() {
      ctx.fillStyle = "#444";
      platforms.forEach(p => {
        ctx.fillRect(p.x - camera.x, p.y, p.width, p.height);
      });
    }

    function drawCoins() {
      ctx.fillStyle = "#FFD700";
      coins.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x - camera.x, c.y, c.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function detectCollision(rect1, rect2) {
      return (
        rect1.x < rect2.x + rect2.width &&
        rect1.x + rect1.width > rect2.x &&
        rect1.y < rect2.y + rect2.height &&
        rect1.y + rect1.height > rect2.y
      );
    }

    const camera = { x: 0 };

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      player.vy += gravity;
      player.x += player.vx;
      player.y += player.vy;

      if (player.y > canvas.height + 200) {
        alert("Game Over! Score: " + score);
        location.reload();
      }

      platforms.forEach(p => {
        if (
          player.vy >= 0 &&
          player.y + player.height <= p.y + player.vy &&
          detectCollision(player, p)
        ) {
          player.y = p.y - player.height;
          player.vy = 0;
          player.jumping = false;
        }
      });

      coins.forEach((c, i) => {
        if (
          player.x < c.x + c.radius &&
          player.x + player.width > c.x - c.radius &&
          player.y < c.y + c.radius &&
          player.y + player.height > c.y - c.radius
        ) {
          score++;
          scoreBoard.innerText = "Score: " + score;
          coins.splice(i, 1);
        }
      });

      drawPlatforms();
      drawCoins();
      drawPlayer();

      if (keys.left) player.vx = -5;
      else if (keys.right) player.vx = 5;
      else player.vx *= friction;

      camera.x = player.x - canvas.width / 3;

      requestAnimationFrame(gameLoop);
    }

    generatePlatforms();
    gameLoop();

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;
      if (e.key === "ArrowUp" && !player.jumping) {
        keys.up = true;
        player.vy = -15;
        player.jumping = true;
      }
    });

    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    document.getElementById("leftBtn").addEventListener("touchstart", () => (keys.left = true));
    document.getElementById("rightBtn").addEventListener("touchstart", () => (keys.right = true));
    document.getElementById("jumpBtn").addEventListener("touchstart", () => {
      if (!player.jumping) {
        player.vy = -15;
        player.jumping = true;
      }
    });
    document.getElementById("leftBtn").addEventListener("touchend", () => (keys.left = false));
    document.getElementById("rightBtn").addEventListener("touchend", () => (keys.right = false));
  </script>
</body>
</html>
