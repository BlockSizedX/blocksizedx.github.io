<!DOCTYPE html>
<html>
<head>
  <title>Click the Box!</title>
  <style>
    body, html {
        height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 2.5em;
    }

    #game {
      position: relative;
      width: 400px;
      height: 400px;
      border: 6px solid #0f0;
      margin-top: 20px;
      background: #222;
      border-radius: 12px;
    }

    #creeper {
      width: 50px;
      height: 50px;
      background: green;
      position: absolute;
      border-radius: 8px;
      box-shadow: 0 0 10px lime;
      cursor: pointer;
      transition: top 0.2s, left 0.2s;
    }

    #score {
      margin-top: 20px;
      font-size: 1.8em;
    }

    .button-box {
      margin-top: 25px;
      display: flex;
      gap: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 1em;
      font-weight: bold;
      background-color: #0f0;
      color: #111;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #0c0;
    }

    @media (max-width: 500px) {
      #game {
        width: 90%;
        height: 300px;
      }

      #creeper {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <h1>💥 Click the Box!</h1>

  <div id="game">
    <div id="creeper"></div>
  </div>

  <div id="score">Score: 0</div>

  <div class="button-box">
    <button onclick="resetScore()">🔁 Reset Score</button>
    <button onclick="goBack()">🔙 Back</button>
  </div>

  <script>
    const creeper = document.getElementById("creeper");
    const game = document.getElementById("game");
    const scoreText = document.getElementById("score");
    let score = 0;

    function randomPosition() {
      const maxX = game.clientWidth - creeper.clientWidth;
      const maxY = game.clientHeight - creeper.clientHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      creeper.style.left = x + "px";
      creeper.style.top = y + "px";
    }

    creeper.addEventListener("click", () => {
      score++;
      scoreText.textContent = "Score: " + score;
      randomPosition();
    });

    function resetScore() {
      score = 0;
      scoreText.textContent = "Score: " + score;
    }

    function goBack() {
      window.location.href = "../index.html#projects"; 
    }

    setInterval(randomPosition, 1000);
    randomPosition();
  </script>
</body>
</html>
